<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College AI — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            overflow: hidden
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse 80% 80% at 50% -20%, rgba(120, 40, 200, 0.3), transparent)
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(18, 18, 22, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04), 0 40px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(24px);
            animation: up .4s cubic-bezier(.16, 1, .3, 1)
        }

        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 14px;
            font-size: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4)
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -.5px
        }

        .logo p {
            font-size: 13px;
            color: #71717a;
            margin-top: 4px
        }

        .tabs {
            display: flex;
            background: #18181b;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 28px;
            gap: 3px
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #71717a;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit
        }

        .tab.on {
            background: #27272a;
            color: #fafafa;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4)
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 4px;
            display: block
        }

        input {
            width: 100%;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 10px;
            color: #fafafa;
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s
        }

        input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15)
        }

        input::placeholder {
            color: #52525b
        }

        .err {
            color: #f87171;
            font-size: 12px;
            min-height: 16px;
            margin-top: -4px
        }

        .btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
            margin-top: 4px
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4)
        }

        .btn:active {
            transform: none
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none
        }

        .divider {
            text-align: center;
            font-size: 12px;
            color: #3f3f46;
            margin: 4px 0
        }

        .admin-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #52525b;
            text-decoration: none;
            transition: color .2s
        }

        .admin-link:hover {
            color: #a1a1aa
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-mark">✦</div>
            <h1>College AI</h1>
            <p>Your intelligent learning assistant</p>
        </div>

        <div class="tabs">
            <button class="tab on" id="t-in" onclick="sw('in')">Sign in</button>
            <button class="tab" id="t-up" onclick="sw('up')">Create account</button>
        </div>

        <form id="f-in" onsubmit="doLogin(event)">
            <div><label>Username or email</label><input id="u" placeholder="Enter your username" required /></div>
            <div><label>Password</label><input id="p" type="password" placeholder="Enter your password" required />
            </div>
            <div class="err" id="e-in"></div>
            <button class="btn" id="b-in">Sign in</button>
        </form>

        <form id="f-up" style="display:none" onsubmit="doRegister(event)">
            <div><label>Username</label><input id="ru" placeholder="Choose a username" required /></div>
            <div><label>Email</label><input id="re" type="email" placeholder="your@email.com" required /></div>
            <div><label>Password</label><input id="rp" type="password" placeholder="Min. 6 characters" required /></div>
            <div class="err" id="e-up"></div>
            <button class="btn" id="b-up">Create account</button>
        </form>

        <a href="/admin.html" class="admin-link">Admin portal →</a>
    </div>

    <script>
        function sw(t) {
            document.getElementById('t-in').classList.toggle('on', t === 'in');
            document.getElementById('t-up').classList.toggle('on', t === 'up');
            document.getElementById('f-in').style.display = t === 'in' ? 'flex' : 'none';
            document.getElementById('f-up').style.display = t === 'up' ? 'flex' : 'none';
            document.getElementById('e-in').textContent = '';
            document.getElementById('e-up').textContent = '';
        }
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('b-in');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const r = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || 'Login failed');
                if (d.user.role === 'admin') { localStorage.setItem('college_token', d.token); window.location = '/admin.html'; return; }
                localStorage.setItem('college_token', d.token);
                window.location = '/chat.html';
            } catch (ex) { document.getElementById('e-in').textContent = ex.message; }
            finally { btn.disabled = false; btn.textContent = 'Sign in'; }
        }
        async function doRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('b-up');
            btn.disabled = true; btn.textContent = 'Creating...';
            try {
                const r = await fetch('/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('ru').value, email: document.getElementById('re').value, password: document.getElementById('rp').value }) });
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || 'Registration failed');
                const lr = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('ru').value, password: document.getElementById('rp').value }) });
                const ld = await lr.json();
                localStorage.setItem('college_token', ld.token);
                window.location = '/chat.html';
            } catch (ex) { document.getElementById('e-up').textContent = ex.message; }
            finally { btn.disabled = false; btn.textContent = 'Create account'; }
        }
        // Auto redirect if already logged in
        const t = localStorage.getItem('college_token');
        if (t) { fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + t } }).then(r => r.ok ? r.json() : null).then(u => { if (u) { window.location = u.role === 'admin' ? '/admin.html' : '/chat.html'; } }); }
    </script>
</body>

</html>
