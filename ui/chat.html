<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>College AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f4f4f5;
            overflow: hidden
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px
        }

        /* LAYOUT */
        .app {
            display: flex;
            height: 100vh
        }

        /* SIDEBAR */
        .sb {
            width: 256px;
            background: #111113;
            border-right: 1px solid #1c1c1e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .sb-top {
            padding: 20px 16px 12px;
            border-bottom: 1px solid #1c1c1e
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0
        }

        .brand-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -.3px
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 9px 12px;
            background: transparent;
            border: 1px solid #27272a;
            border-radius: 10px;
            color: #a1a1aa;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit
        }

        .new-chat-btn:hover {
            background: #18181b;
            color: #f4f4f5;
            border-color: #3f3f46
        }

        .sb-nav {
            flex: 1;
            padding: 8px;
            overflow-y: auto
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border-radius: 9px;
            color: #a1a1aa;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            border: none;
            background: transparent;
            font-family: inherit;
            width: 100%;
            text-align: left
        }

        .nav-item:hover {
            background: #18181b;
            color: #f4f4f5
        }

        .nav-item.active {
            background: #1c1c1e;
            color: #f4f4f5
        }

        .nav-icon {
            opacity: .7;
            font-size: 15px
        }

        .sb-bottom {
            padding: 12px;
            border-top: 1px solid #1c1c1e
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s
        }

        .user-card:hover {
            background: #18181b
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0
        }

        .user-info {
            flex: 1;
            min-width: 0
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .user-email {
            font-size: 11px;
            color: #71717a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .logout-ico {
            color: #52525b;
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color .15s
        }

        .logout-ico:hover {
            color: #a1a1aa
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* CHAT */
        .chat-top {
            padding: 14px 28px;
            border-bottom: 1px solid #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .chat-top-title {
            font-size: 14px;
            font-weight: 600;
            color: #f4f4f5
        }

        .model-pill {
            font-size: 11px;
            color: #a78bfa;
            background: rgba(109, 40, 217, .15);
            border: 1px solid rgba(109, 40, 217, .3);
            padding: 4px 10px;
            border-radius: 99px;
            font-weight: 600
        }

        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 32px 0
        }

        .msg-row {
            display: flex;
            justify-content: flex-start;
            padding: 0 28px;
            margin-bottom: 24px;
            gap: 12px;
            max-width: 860px;
            margin-left: auto;
            margin-right: auto;
            width: 100%
        }

        .msg-row.u {
            flex-direction: row-reverse
        }

        .msg-av {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700
        }

        .msg-av.ai {
            background: #18181b;
            border: 1px solid #27272a
        }

        .msg-av.me {
            background: linear-gradient(135deg, #6d28d9, #4338ca)
        }

        .msg-content {
            flex: 1;
            max-width: 680px
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word
        }

        .u .bubble {
            background: #6d28d9;
            border-bottom-right-radius: 4px;
            color: #fff
        }

        .ai .bubble {
            background: #18181b;
            border: 1px solid #27272a;
            border-bottom-left-radius: 4px
        }

        .bubble pre {
            background: #0a0a0a;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 13px
        }

        .bubble code {
            font-family: 'Fira Code', monospace
        }

        .bubble strong {
            color: #a78bfa
        }

        .bubble p {
            margin-bottom: 8px
        }

        .bubble p:last-child {
            margin-bottom: 0
        }

        .bubble h1,
        .bubble h2,
        .bubble h3 {
            margin: 12px 0 6px;
            color: #e4e4e7
        }

        .bubble ul,
        .bubble ol {
            padding-left: 20px;
            margin: 6px 0
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #52525b;
            border-radius: 50%;
            animation: ty 1.2s ease infinite
        }

        .typing span:nth-child(2) {
            animation-delay: .2s
        }

        .typing span:nth-child(3) {
            animation-delay: .4s
        }

        @keyframes ty {

            0%,
            60%,
            100% {
                transform: none;
                opacity: .4
            }

            30% {
                transform: translateY(-5px);
                opacity: 1
            }
        }

        /* WELCOME */
        .welcome {
            max-width: 640px;
            margin: 60px auto 0;
            padding: 0 28px;
            text-align: center
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 20px
        }

        .welcome h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -.5px
        }

        .welcome p {
            color: #71717a;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 28px
        }

        .prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center
        }

        .prompt-chip {
            padding: 8px 14px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 99px;
            font-size: 13px;
            color: #a1a1aa;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit
        }

        .prompt-chip:hover {
            background: #1c1c1e;
            color: #f4f4f5;
            border-color: #3f3f46
        }

        /* INPUT */
        .input-wrap {
            padding: 16px 28px 20px;
            border-top: 1px solid #1c1c1e;
            background: #0a0a0a
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #111113;
            border: 1px solid #27272a;
            border-radius: 14px;
            padding: 12px 14px;
            max-width: 860px;
            margin: 0 auto;
            transition: border-color .2s
        }

        .input-box:focus-within {
            border-color: #6d28d9;
            box-shadow: 0 0 0 3px rgba(109, 40, 217, .12)
        }

        #inp {
            flex: 1;
            background: none;
            border: none;
            color: #f4f4f5;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 180px;
            line-height: 1.6
        }

        #inp::placeholder {
            color: #3f3f46
        }

        .send {
            background: #6d28d9;
            border: none;
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s;
            flex-shrink: 0
        }

        .send:hover {
            background: #5b21b6;
            transform: scale(1.05)
        }

        .send:disabled {
            background: #27272a;
            color: #52525b;
            cursor: not-allowed;
            transform: none
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: #3f3f46;
            margin-top: 8px;
            max-width: 860px;
            margin-left: auto;
            margin-right: auto
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="sb">
            <div class="sb-top">
                <div class="brand">
                    <div class="brand-mark">✦</div>
                    <span class="brand-name">College AI</span>
                </div>
                <button class="new-chat-btn" onclick="newChat()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    New conversation
                </button>
            </div>
            <div class="sb-nav" id="hist"></div>
            <div class="sb-bottom">
                <button class="nav-item" onclick="window.location='/apikey.html'" style="margin-bottom:4px">
                    <span class="nav-icon">🔑</span> My API Key
                </button>
                <div class="user-card">
                    <div class="avatar" id="av">?</div>
                    <div class="user-info">
                        <div class="user-name" id="uname">Loading...</div>
                        <div class="user-email" id="uemail"></div>
                    </div>
                    <div class="logout-ico" onclick="logout()" title="Sign out">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="chat-top">
                <span class="chat-top-title" id="ctitle">New conversation</span>
                <span class="model-pill">Auto-routing · General & Code</span>
            </div>
            <div class="msgs" id="msgs">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">✦</div>
                    <h2>How can I help you today?</h2>
                    <p>Ask me anything — code, analysis, writing, research, math. I'll route your question to the best
                        model automatically.</p>
                    <div class="prompts">
                        <button class="prompt-chip"
                            onclick="q('Write a Python function to sort a list by multiple keys')">Sort algorithm
                            →</button>
                        <button class="prompt-chip" onclick="q('Explain neural networks in simple terms')">Neural
                            networks →</button>
                        <button class="prompt-chip" onclick="q('Write a SQL query to find duplicate records')">SQL query
                            →</button>
                        <button class="prompt-chip" onclick="q('Summarize the key concepts of machine learning')">ML
                            concepts →</button>
                    </div>
                </div>
            </div>
            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="inp" placeholder="Message College AI…" rows="1" onkeydown="onKey(event)"
                        oninput="resize(this)"></textarea>
                    <button class="send" id="sb" onclick="send()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
                <div class="hint">College AI may make mistakes. Always verify important information.</div>
            </div>
        </main>
    </div>

    <script>
        let token = localStorage.getItem('college_token'), me = null, busy = false;
        if (!token) { window.location = '/'; throw 0; }

        fetch('/auth/me', { headers: { Authorization: 'Bearer ' + token } }).then(r => r.ok ? r.json() : null).then(u => {
            if (!u) { localStorage.removeItem('college_token'); window.location = '/'; return; }
            me = u;
            document.getElementById('uname').textContent = u.username;
            document.getElementById('uemail').textContent = u.email || '';
            document.getElementById('av').textContent = u.username[0].toUpperCase();
            if (u.role === 'admin') {
                const nb = document.createElement('button');
                nb.className = 'nav-item'; nb.innerHTML = '<span class="nav-icon">⚙️</span> Admin Panel';
                nb.onclick = () => window.location = '/admin.html';
                document.getElementById('hist').prepend(nb);
            }
        });

        function logout() { localStorage.removeItem('college_token'); window.location = '/'; }
        function newChat() { document.getElementById('msgs').innerHTML = '<div class="welcome" id="welcome"><div class="welcome-icon">✦</div><h2>How can I help you today?</h2><p>Ask me anything — code, analysis, writing, research, math.</p></div>'; document.getElementById('ctitle').textContent = 'New conversation'; }
        function q(t) { document.getElementById('inp').value = t; send(); }
        function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
        function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 180) + 'px'; }

        async function send() {
            if (busy) return;
            const txt = document.getElementById('inp').value.trim();
            if (!txt) return;
            const w = document.getElementById('welcome'); if (w) w.remove();
            addMsg('u', txt);
            document.getElementById('inp').value = '';
            document.getElementById('inp').style.height = 'auto';
            const bid = 'b' + Date.now();
            addMsg('ai', '', bid);
            document.getElementById(bid).innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            busy = true; document.getElementById('sb').disabled = true;
            try {
                const r = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ message: txt }) });
                if (!r.ok) { const e = await r.json(); document.getElementById(bid).textContent = 'Error: ' + (e.detail || 'Unknown'); return; }
                const rd = r.body.getReader(), dec = new TextDecoder(); let full = '';
                document.getElementById(bid).innerHTML = '';
                while (true) { const { done, value } = await rd.read(); if (done) break; full += dec.decode(value, { stream: true }); document.getElementById(bid).innerHTML = md(full); document.getElementById('msgs').scrollTop = 99999; }
            } catch (e) { document.getElementById(bid).textContent = 'Connection error: ' + e.message; }
            finally { busy = false; document.getElementById('sb').disabled = false; document.getElementById('msgs').scrollTop = 99999; }
        }

        function addMsg(who, txt, id) {
            const m = document.getElementById('msgs');
            const r = document.createElement('div'); r.className = 'msg-row ' + (who === 'u' ? 'u' : '');
            const av = document.createElement('div'); av.className = 'msg-av ' + (who === 'u' ? 'me' : 'ai');
            av.textContent = who === 'u' ? (me?.username?.[0]?.toUpperCase() || 'U') : '✦';
            const c = document.createElement('div'); c.className = 'msg-content';
            const b = document.createElement('div'); b.className = 'bubble';
            if (id) b.id = id; b.innerHTML = txt ? md(txt) : '';
            c.appendChild(b); r.appendChild(av); r.appendChild(c); m.appendChild(r); m.scrollTop = 99999;
        }

        function md(t) {
            return t
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(?!<[pha])/gm, s => s ? '<p>' + s + '</p>' : s);
        }
    </script>
</body>

</html>
